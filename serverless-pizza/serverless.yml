service: pizzaApp

provider:
  name: aws
  runtime: nodejs20.x
  region: eu-west-2
  environment:
    REGION: ${self:provider.region}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - sqs:sendMessage
          Resource:
            Fn::GetAtt: [PendingOrderQueue, Arn]
        - Effect: Allow
          Action:
            - sqs:sendMessage
          Resource:
            Fn::GetAtt: [OrdersToSaveQueue, Arn]

functions:
  newOrder:
    handler: handler.newOrder
    environment:
      PENDING_ORDERS_QUEUE:
        Ref: PendingOrderQueue
    events:
      - httpApi:
          path: /order
          method: post
  getOrder:
    handler: handler.getOrder
    events:
      - httpApi:
          path: /order/{orderId}
          method: get
  prepOrder:
    handler: handler.prepOrder
    events:
      - sqs:
          arn:
            Fn::GetAtt: [PendingOrderQueue, Arn]
          batchSize: 1
  sendOrder:
    handler: handler.sendOrder
    environment:
      ORDERS_TO_SEND_QUEUE:
        Ref: OrdersToSaveQueue

resources:
  Resources:
    PendingOrderQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: PendingOrderQueue
    OrdersToSaveQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: OrdersToSaveQueue
